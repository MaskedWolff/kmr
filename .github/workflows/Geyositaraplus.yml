name: GeoSitaraplus JioTV Fix

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Download Source Playlist
        run: |
          curl -sL "${{ secrets.SRCSITARAPLUS }}" -o source.m3u

      - name: Clean HTML
        run: |
          sed -n '/#EXTM3U/,$p' source.m3u > clean.m3u

      - name: Fix JioTV Cookie + Remove Spaces
        run: |
          awk '
          /#EXTHTTP/ {
            gsub(/\{ /,"{")
            gsub(/ \}/,"}")
            match($0, /cookie":"([^"]+)/, a)
            cookie=a[1]
            print
            next
          }

          /\.mpd/ {
            url=$0
            sub(/\?.*/, "", url)
            print url "?" cookie "&xxx=%7Ccookie=" cookie
            next
          }

          {print}
          ' clean.m3u > geyositaraplus.m3u

      - name: Commit Update
        run: |
          git add geyositaraplus.m3u
          git diff --cached --quiet || git commit -m "Fix GeoSitaraplus playlist"
          git push
