name: Build IPTV

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -------- Install jq --------
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # -------- Download JSON Sources --------
      - name: Download JSON sources
        run: |
          set -e
          curl -fL "${{ secrets.SRC1 }}" -o 1.json
          curl -fL "${{ secrets.SRC2 }}" -o 2.json
          curl -fL "${{ secrets.SRC3 }}" -o 3.json

      # -------- Convert JSON to M3U --------
      - name: Convert JSON to M3U
        run: |
          echo "#EXTM3U" > Kashmir.m3u

          for f in 1.json 2.json 3.json; do
            jq -r '
              .[] |
              "#EXTINF:-1 tvg-logo=\"" + .logo + "\" group-title=\"" + .groupTitle + "\"," + .name,
              .link,
              "#KODIPROP:inputstream.adaptive.license_type=" + .drmScheme,
              "#KODIPROP:inputstream.adaptive.license_key=" + .drmLicense,
              ""
            ' "$f" >> Kashmir.m3u
          done

      # -------- Remove duplicate clearkey lines --------
      - name: Clean duplicate clearkey tags
        run: |
          awk '
          {
            if ($0 == "#KODIPROP:inputstream.adaptive.license_type=clearkey") {
              if (prev == $0) next
            }
            print
            prev = $0
          }
          ' Kashmir.m3u > cleaned.m3u
          mv cleaned.m3u Kashmir.m3u

      # -------- Commit only if changed --------
      - name: Commit playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Kashmir.m3u
          git diff --cached --quiet && exit 0
          git commit -m "Auto update Kashmir IPTV playlist"
          git push
