name: Build IPTV Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download source playlists
        run: |
          curl -L "${{ secrets.SRCFKODE }}" -o src1.m3u
          curl -L "${{ secrets.SRCJTV }}" -o src2.m3u
          curl -L "${{ secrets.SRCLIVEVENTS }}" -o src3.m3u

      - name: Merge playlists
        run: |
          echo "#EXTM3U" > Kashmir.m3u
          grep -hv "^#EXTM3U" src1.m3u src2.m3u src3.m3u >> Kashmir.m3u

      - name: Remove duplicate clearkey lines
        run: |
          awk '!seen[$0]++' Kashmir.m3u > temp.m3u
          mv temp.m3u Kashmir.m3u

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Kashmir.m3u
          git diff --cached --quiet || git commit -m "Auto update playlist"
          git push
