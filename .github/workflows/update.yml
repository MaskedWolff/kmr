name: Build IPTV Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download JSON source
        run: |
          curl -L "${{ secrets.SRCFKODE }}" -o src.json

      - name: Convert JSON to M3U
        run: |
          echo "#EXTM3U" > Kashmir.m3u
          jq -r '
          to_entries[] |
          "#EXTINF:-1 tvg-id=\"\(.key+1000)\" group-title=\"Jiostar\" tvg-logo=\"\(.value.logo)\",\(.value.name)",
          "#KODIPROP:inputstream.adaptive.license_type=\(.value.drmScheme)",
          "#KODIPROP:inputstream.adaptive.license_key=\(.value.drmLicense)",
          "#EXTVLCOPT:http-user-agent=plaYtv/7.1.3 (Linux;Android 13) ygx/69.1 ExoPlayerLib/824.0",
          "#EXTHTTP:{\"cookie\":\"\(.value.cookie)\"}",
          "\(.value.link)?\(.value.cookie)&xxx=%7Ccookie=\(.value.cookie)"
          ' src.json >> Kashmir.m3u

      - name: Commit playlist
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Kashmir.m3u
          git diff --cached --quiet || git commit -m "Auto update IPTV playlist"
          git push
