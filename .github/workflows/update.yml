name: Build IPTV Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download JSON source
        run: |
          curl -L "${{ secrets.SRCFKODE }}" -o src.json

      - name: Convert JSON to M3U
        run: |
          echo "#EXTM3U" > Kashmir.m3u
          jq -r '.[] | 
          "#EXTINF:-1 tvg-name=\"" + .name + "\" group-title=\"" + .groupTitle + "\"," + .name,
          "#KODIPROP:inputstream.adaptive.license_type=clearkey",
          "#KODIPROP:inputstream.adaptive.license_key=7a450f0820c4589690eb336c29f18da6:820e84119563b56d6e6f0bf514cbdc3c",
          "#EXTVLCOPT:cookie=__hdnea__=st=1772569507~exp=1772655907~acl=/*~hmac=392bc917ffad0d4d27c61d8617c3dd3732ff28187ea1174ec88610955112a26c",
          .link' src.json >> Kashmir.m3u

      - name: Commit playlist
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Kashmir.m3u
          git diff --cached --quiet || git commit -m "Auto update IPTV playlist"
          git push
