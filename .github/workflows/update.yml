name: Build IPTV

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -------- Download M3U Sources --------
      - name: Download M3U sources
        run: |
          set -e
          curl -fL "${{ secrets.SRCFKODE }}" -o 1.m3u
          curl -fL "${{ secrets.SRCJTV }}" -o 2.m3u
          curl -fL "${{ secrets.SRCLIVEVENTS }}" -o 3.m3u

      # -------- Merge M3U Files --------
      - name: Merge playlists
        run: |
          echo "#EXTM3U" > Kashmir.m3u

          for f in 1.m3u 2.m3u 3.m3u; do
            grep -v "^#EXTM3U" "$f" >> Kashmir.m3u
          done

      # -------- Remove duplicate clearkey lines --------
      - name: Clean duplicate clearkey tags
        run: |
          awk '
          {
            if ($0 == "#KODIPROP:inputstream.adaptive.license_type=clearkey") {
              if (prev == $0) next
            }
            print
            prev = $0
          }
          ' Kashmir.m3u > cleaned.m3u
          mv cleaned.m3u Kashmir.m3u

      # -------- Commit only if changed --------
      - name: Commit playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Kashmir.m3u
          git diff --cached --quiet && exit 0
          git commit -m "Auto update Kashmir IPTV playlist"
          git push
