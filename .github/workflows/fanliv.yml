name: FanLiv Playlist Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/1 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download Source Playlist
        run: |
          curl -L "${{ secrets.SRCFANLIV }}" -o source.m3u

      - name: Clean HTML Header
        run: |
          sed -n '/#EXTM3U/,$p' source.m3u > fanliv.m3u

      - name: Check for Changes
        id: diff
        run: |
          if git diff --quiet fanliv.m3u; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push
        if: steps.diff.outputs.no_changes == 'false'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add fanliv.m3u
          git commit -m "Auto update FanLiv playlist"
          git push
