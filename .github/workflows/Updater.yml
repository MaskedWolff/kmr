name: Build Playlists

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Continuous Playlist Builder (5s check)
        run: |
          while true; do

          echo "Fetching JSON source..."
          curl -L "${{ secrets.SRCFKODE }}?t=$(date +%s)" -o src.json

          echo "#EXTM3U" > Kashmir.m3u
          jq -r '.[] |
          "#EXTINF:-1 tvg-name=\"" + .name + "\" tvg-logo=\"" + .logo + "\"," + .name,
          "#KODIPROP:inputstream.adaptive.license_type=" + .drmScheme,
          "#KODIPROP:inputstream.adaptive.license_key=" + .drmLicense,
          "#EXTVLCOPT:http-user-agent=plaYtv/7.1.3 (Linux;Android 13) ygx/69.1 ExoPlayerLib/824.0",
          "#EXTHTTP:{\"cookie\":\"" + .cookie + "\"}",
          (.link + "?" + .cookie + "&xxx=%7Ccookie=" + .cookie)' src.json >> Kashmir.m3u

          echo "Fetching second M3U..."
          curl -L "${{ secrets.SRCSTAR }}?t=$(date +%s)" -o extra_playlist.m3u

          git add Kashmir.m3u extra_playlist.m3u
          git diff --cached --quiet || git commit -m "Auto update playlists"
          git push

          echo "Sleeping 5 seconds..."
          sleep 5

          done
