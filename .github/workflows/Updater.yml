name: Build Playlists

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------- JSON → M3U ----------
      - name: Download JSON source
        run: |
          curl -L "${{ secrets.SRCFKODE }}" -o src.json

      - name: Convert JSON to M3U
        run: |
          echo "#EXTM3U" > Kashmir.m3u
          jq -r '.[] |
          "#EXTINF:-1 tvg-name=\"" + .name + "\" tvg-logo=\"" + .logo + "\"," + .name,
          "#KODIPROP:inputstream.adaptive.license_type=" + .drmScheme,
          "#KODIPROP:inputstream.adaptive.license_key=" + .drmLicense,
          "#EXTVLCOPT:http-user-agent=plaYtv/7.1.3 (Linux;Android 13) ygx/69.1 ExoPlayerLib/824.0",
          "#EXTHTTP:{\"cookie\":\"" + .cookie + "\"}",
          (.link + "?" + .cookie + "&xxx=%7Ccookie=" + .cookie)' src.json >> Kashmir.m3u

      # ---------- FIX JTV M3U ----------
      - name: Download JTV playlist
        run: |
          curl -L "${{ secrets.SRCJTX }}" -o jtv.m3u

      - name: Fix JTV playlist
        run: |
          echo "#EXTM3U" > fix_kmr.m3u
          awk '
          /#EXTINF/ {print; next}
          /#KODIPROP/ {print; next}

          /index\.mpd/ {
            if (match($0, /\?(__hdnea__=[^&]+)/, a)) {
              cookie=a[1]
              print "#EXTVLCOPT:http-user-agent=plaYtv/7.1.3 (Linux;Android 13) ygx/69.1 ExoPlayerLib/824.0"
              print "#EXTHTTP:{\"cookie\":\"" cookie "\"}"
              print $0 "&xxx=%7Ccookie=" cookie
            } else {
              print
            }
            next
          }

          {print}
          ' jtv.m3u >> fix_kmr.m3u

      - name: Commit playlists
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Kashmir.m3u fix_kmr.m3u
          git diff --cached --quiet || git commit -m "Auto update playlists"
          git push
